<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h2>Sign In</h2>
    <input type="email" id="signInEmail" placeholder="Enter your email">
    <input type="password" id="signInPassword" placeholder="Enter a password">
    <input type="password" id="signInConfirmPassword" placeholder="Confirm password">
    
	
	<label>
        <input type="checkbox" id="isAdmin"> Admin Account
    </label>
	
	
    <button onclick="signIn()">Sign In</button>
    <p id="signInMessage"></p>
	</div>
    <script src="script.js"></script>
</body>
</html>
